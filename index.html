<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chicken Geo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
      <div class="lang-toggle">
        <button class="btn-lang selected" data-lang="fr">&#x1F1EB;&#x1F1F7;</button>
        <button class="btn-lang" data-lang="en">&#x1F1EC;&#x1F1E7;</button>
        <button class="btn-lang" data-lang="es">&#x1F1EA;&#x1F1F8;</button>
      </div>
      <h1 class="title">Chicken Geo</h1>
      <div class="mode-buttons">
        <button class="btn-mode" data-mode="countries" id="btn-mode-countries">Pays</button>
        <button class="btn-mode" data-mode="flags" id="btn-mode-flags">Drapeaux</button>
        <button class="btn-mode" data-mode="capitals" id="btn-mode-capitals">Capitales</button>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <div id="hud">
        <div id="timer-container">
          <div id="timer-bar"></div>
        </div>
        <p class="subtitle" id="game-subtitle">Fais atterrir la poule sur le bon pays !</p>
        <div id="country-name"></div>
        <div id="score-display"></div>
      </div>
      <button id="btn-accelerate" class="btn-accelerate">Acc&eacute;l&eacute;rer !</button>
      <div id="scene-container"></div>
      <div id="feedback-overlay"></div>
      <img id="feedback-chicken" src="" alt="" />
      <img id="feedback-chicken-point" src="" alt="" />
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="screen">
      <h1 class="title end-title" id="end-title">Partie termin&eacute;e !</h1>
      <p id="final-score" class="final-score"></p>
      <button id="btn-replay" class="btn-play">Rejouer</button>
      <button id="btn-back-menu" class="btn-secondary">Retour au menu</button>
    </div>

    <canvas id="particles-canvas"></canvas>

    <script src="script.js"></script>
  </body>
</html>
