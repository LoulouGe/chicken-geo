<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chicken Geo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
      <h1 class="title">Chicken Geo</h1>
      <p class="subtitle">Fais atterrir la poule sur le bon pays !</p>
      <button id="btn-play" class="btn-play">Jouer !</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <div id="hud">
        <div id="timer-container">
          <div id="timer-bar"></div>
        </div>
        <div id="country-name"></div>
        <div id="score-display">0 / 10</div>
      </div>
      <canvas id="globe"></canvas>
      <div id="feedback-overlay"></div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="screen">
      <h1 class="title end-title">Partie terminée !</h1>
      <p id="final-score" class="final-score"></p>
      <button id="btn-replay" class="btn-play">Rejouer</button>
    </div>

    <canvas id="particles-canvas"></canvas>

    <script src="script.js"></script>
  </body>
</html>
